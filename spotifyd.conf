# spotifyd configuration for Album Player
# Place this at ~/.config/spotifyd/spotifyd.conf
#
# spotifyd runs as a Spotify Connect receiver, allowing the Pi to play
# Spotify audio through connected Bluetooth speakers.
#
# For full documentation: https://spotifyd.github.io/spotifyd/config/File.html

[global]
# Device name that appears in Spotify Connect
device_name = "Album Player"

# Audio backend - use alsa (slim build doesn't include pulseaudio)
backend = "alsa"

# ALSA device - use default which routes through Bluetooth when connected
device = "default"

# Bitrate: 96, 160, or 320
bitrate = 160

# Cache directory for Spotify data
cache_path = "/home/dyonak/.cache/spotifyd"

# Volume normalization
volume_normalisation = true
normalisation_pregain = -10

# Device type shown in Spotify app
device_type = "speaker"

# Optional: Uncomment and set if you want to login with credentials
# This allows fully headless operation without needing to select the device
# from the Spotify app first.
#
# username = "your_spotify_username"
# password = "your_spotify_password"
#
# Or use password command for security:
# password_cmd = "cat /home/dyonak/.spotify_password"

# Zeroconf for Spotify Connect discovery
zeroconf_port = 4381
